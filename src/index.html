<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>json-beautify</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body { margin:0; font-family: system-ui, sans-serif; background:#0F141A; color:#E6EDF3; }
      .layout { display:flex; height:100vh; }
      textarea { width:50%; padding:12px; font-family: ui-monospace, monospace; font-size:14px; resize:none; border:none; outline:none; background:#16202A; color:#E6EDF3; }
      .right { display:flex; flex-direction:column; width:50%; }
      .toolbar { padding:8px; background:#121A22; display:flex; gap:8px; align-items:center; }
      .toolbar button { background:#1F2A33; color:#E6EDF3; border:1px solid #24323D; padding:6px 12px; cursor:pointer; border-radius:4px; }
      .toolbar button:hover { background:#273643; }
      pre { flex:1; margin:0; overflow:auto; background:#16202A; padding:12px; font-size:14px; }
      .status { font-size:12px; opacity:0.75; }
      .error { color:#FF5370; }
    </style>
  </head>
  <body>
    <div class="layout">
      <textarea id="input" placeholder="Pega JSON aquí..."></textarea>
      <div class="right">
        <div class="toolbar">
          <button id="formatBtn">Formatear</button>
          <button id="minifyBtn">Minificar</button>
          <span id="status" class="status"></span>
        </div>
        <pre id="output" aria-label="Salida JSON"></pre>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
