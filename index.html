<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>json-beautify</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
  :root {
        --bg: #070b12;
        --grid-line: rgba(255,255,255,0.04);
        --gradient-accent: linear-gradient(135deg,#ff6a3d 0%,#ff2ecd 35%,#5f4bff 70%,#2dd4ff 100%);
        --panel: rgba(20,26,40,0.85);
        --panel-border: #273347;
        --panel-alt: rgba(15,19,30,0.75);
        --panel-blur: blur(12px) saturate(140%);
        --text: #f2f7ff;
        --muted: #9aa6bd;
        --error: #ff5370;
        --focus: #5f4bff;
        /* Token colors (refined) */
        --c-key: #46c6ff;
        --c-string: #ff7ac6;
        --c-number: #ffd166;
        --c-boolean: #b794ff;
        --c-null: #b794ff;
        --c-brace: #7dd3fc;
        --c-punct: #7dd3fc;
      }
      :root[data-theme='light'] {
        --bg:#f5f7fb;
        --grid-line:rgba(0,0,0,0.06);
        --panel: rgba(255,255,255,0.85);
        --panel-alt: rgba(250,252,255,0.75);
        --panel-border:#d1d9e4;
        --panel-blur:blur(8px) saturate(160%);
        --text:#1d2430;
        --muted:#5a6475;
        --c-key:#006d92;
        --c-string:#b60060;
        --c-number:#8b5d00;
        --c-boolean:#5a2d91;
        --c-null:#5a2d91;
        --c-brace:#004c66;
        --c-punct:#004c66;
        --focus:#674bff;
      }
      body { margin:0; font-family: 'Inter', system-ui, sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; position:relative; transition:background .4s, color .4s; }
      body:before { content:""; position:fixed; inset:0; background:
        linear-gradient(var(--bg), var(--bg)),
        repeating-linear-gradient(0deg, var(--grid-line) 0 1px, transparent 1px 40px),
        repeating-linear-gradient(90deg, var(--grid-line) 0 1px, transparent 1px 40px); background-blend-mode:overlay; pointer-events:none; }
      .app-shell { display:flex; flex-direction:column; height:100vh; }
  .header { display:flex; align-items:center; gap:18px; padding:14px 22px; position:relative; z-index:2; }
  .brand { font-size:18px; font-weight:600; letter-spacing:.5px; background:var(--gradient-accent); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 2px 6px rgba(255,106,61,0.35)); }
  .theme-toggle { margin-left:auto; background:var(--panel-alt); border:1px solid var(--panel-border); padding:6px 14px; border-radius:20px; cursor:pointer; font-size:12px; color:var(--muted); transition:.25s; }
  .theme-toggle:hover { color:var(--text); }
      .layout { flex:1; display:flex; min-height:0; }
      textarea { width:50%; padding:18px 18px 18px 22px; font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size:13.5px; line-height:1.5; resize:none; border:1px solid var(--panel-border); outline:none; background:var(--panel); backdrop-filter:var(--panel-blur); color:var(--text); border-right:none; position:relative; }
      textarea:focus { border-color:var(--focus); box-shadow:0 0 0 1px var(--focus), 0 0 0 3px rgba(95,75,255,0.25); z-index:1; }
      .right { display:flex; flex-direction:column; width:50%; position:relative; }
  .toolbar { padding:8px 16px; background:var(--panel-alt); backdrop-filter:var(--panel-blur); display:flex; gap:10px; align-items:center; border:1px solid var(--panel-border); border-left:none; border-bottom:none; flex-wrap:wrap; }
  .toolbar button { background:var(--panel-alt); color:var(--text); border:1px solid var(--panel-border); padding:6px 14px; cursor:pointer; border-radius:18px; font-size:12px; letter-spacing:.4px; position:relative; overflow:hidden; transition:.3s; }
      .toolbar button:before { content:""; position:absolute; inset:0; background:var(--gradient-accent); opacity:0; transition:.35s; }
      .toolbar button span { position:relative; z-index:1; }
      .toolbar button:hover:before { opacity:0.12; }
      .toolbar button:hover { border-color:#3e4c63; }
      .toolbar button:active { transform:translateY(1px); }
      pre { flex:1; margin:0; overflow:auto; background:var(--panel); backdrop-filter:var(--panel-blur); padding:18px 22px; font-size:13.5px; line-height:1.5; border:1px solid var(--panel-border); border-left:none; }
      pre code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight:450; }
      pre::-webkit-scrollbar { width:10px; }
      pre::-webkit-scrollbar-track { background:transparent; }
      pre::-webkit-scrollbar-thumb { background:#2c3b55; border-radius:6px; }
      pre::-webkit-scrollbar-thumb:hover { background:#39516f; }
      .status { font-size:11.5px; font-family:'JetBrains Mono', ui-monospace; color:var(--muted); display:flex; gap:8px; }
  .field { position:relative; }
  .search-input { background:var(--panel); border:1px solid var(--panel-border); border-radius:14px; padding:6px 10px 6px 28px; font-size:12px; font-family:inherit; color:var(--text); width:150px; transition:.25s; }
  .search-input:focus { outline:none; border-color:var(--focus); }
  .search-icon { position:absolute; top:50%; left:8px; transform:translateY(-50%); font-size:12px; opacity:.6; }
  .history-select { background:var(--panel); color:var(--text); border:1px solid var(--panel-border); border-radius:14px; padding:6px 10px; font-size:12px; }
  .history-select:focus { outline:none; border-color:var(--focus); }
  .highlight-match { background:rgba(255,234,0,0.25); box-shadow:0 0 0 1px rgba(255,234,0,0.4); border-radius:2px; }
  .drag-overlay { position:fixed; inset:0; background:rgba(95,75,255,0.15); backdrop-filter:blur(4px); border:3px dashed var(--focus); display:flex; align-items:center; justify-content:center; font-size:22px; letter-spacing:1px; color:var(--focus); z-index:20; pointer-events:none; opacity:0; transition:.3s; }
  .drag-overlay.active { opacity:1; }
      .error { color:var(--error); text-shadow:0 0 4px rgba(255,83,112,0.35); }
      /* Tokens */
      .color-key { color:var(--c-key); font-weight:500; }
      .color-string { color:var(--c-string); }
      .color-number { color:var(--c-number); }
      .color-boolean { color:var(--c-boolean); font-style:italic; }
      .color-null { color:var(--c-null); font-style:italic; }
      .color-brace { color:var(--c-brace); }
      .color-punct { color:var(--c-punct); opacity:.85; }
      .color-other { color:var(--text); }
  .view-tabs { display:flex; gap:6px; padding:6px 16px 4px; background:var(--panel-alt); border:1px solid var(--panel-border); border-left:none; border-top:none; }
  .vt-btn { background:transparent; border:1px solid var(--panel-border); color:var(--muted); padding:4px 12px; font-size:11px; letter-spacing:.5px; cursor:pointer; border-radius:14px; transition:.25s; }
  .vt-btn.active { color:var(--text); background:#1e2636; border-color:#364152; }
  .vt-btn:hover { color:var(--text); }
  .tree-view { font-family:'JetBrains Mono', ui-monospace, monospace; padding:10px 16px; background:var(--panel); border:1px solid var(--panel-border); border-top:none; height:100%; overflow:auto; }
  .tw-line { white-space:nowrap; font-size:13px; line-height:1.4; }
  .tw-line .tw-key { color:var(--c-key); font-weight:500; }
  .tw-meta { color:var(--muted); }
  .tw-string { color:var(--c-string); }
  .tw-number { color:var(--c-number); }
  .tw-boolean { color:var(--c-boolean); }
  .tw-null { color:var(--c-null); font-style:italic; }
  .tw-toggle { display:inline-block; width:1.1em; cursor:pointer; color:var(--c-brace); }
  .tw-spacer { display:inline-block; width:1.1em; }
  .view-tree[hidden] { display:none !important; }
      .footer { font-size:11px; color:var(--muted); padding:6px 14px; text-align:right; background:transparent; }
      .footer a { color:var(--c-key); text-decoration:none; }
      .footer a:hover { text-decoration:underline; }
      ::selection { background:#5f4bff; color:#fff; }
      @media (max-width:900px) { .layout { flex-direction:column; } textarea, .right { width:100%; height:50%; } pre { border-left:1px solid var(--panel-border); border-top:none; } }
    </style>
  </head>
  <body>
    <div class="app-shell">
  <div class="header"><div class="brand">json‑beautify</div><button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema">Tema</button></div>
  <div class="layout">
  <textarea id="input" placeholder="Pega JSON aquí..."></textarea>
  <div class="right">
        <div class="toolbar">
          <button id="formatBtn"><span>Formatear</span></button>
          <button id="minifyBtn"><span>Minificar</span></button>
          <button id="copyPrettyBtn" title="Copiar formateado"><span>Copiar Pretty</span></button>
            <button id="copyMinBtn" title="Copiar minificado"><span>Copiar Min</span></button>
          <button id="exportBtn" title="Exportar JSON"><span>Exportar</span></button>
          <label class="field" title="Buscar"><span class="search-icon">🔍</span><input id="searchInput" class="search-input" placeholder="Buscar" /></label>
          <select id="historySelect" class="history-select" aria-label="Historial">
            <option value="">Historial</option>
          </select>
          <input type="file" id="fileInput" accept="application/json,.json" hidden />
          <button id="loadFileBtn"><span>Cargar Archivo</span></button>
          <span id="status" class="status"></span>
        </div>
        <div class="view-tabs">
          <button class="vt-btn active" data-view="text">Texto</button>
          <button class="vt-btn" data-view="tree">Árbol</button>
        </div>
        <pre id="output" aria-label="Salida JSON" class="view-text"></pre>
  <div id="tree" class="view-tree" role="tree" aria-label="Árbol JSON" hidden></div>
      </div>
      </div>
      <div class="footer">Sprint 4 • <a href="https://github.com/Javiyack/json-beautify" target="_blank" rel="noopener">GitHub</a></div>
    </div>
    <div id="dragOverlay" class="drag-overlay">Suelta el archivo .json</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
